{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="mb-0">Most Commented User</h2>
        <a class="btn btn-outline-secondary btn-sm" href="{% url 'home.index' %}">Back</a>
    </div>
    <div class="card shadow-sm">
        <div class="card-body">
            {% if max_total %}
                <p class="mb-2"><strong>User(s):</strong></p>
                <ul>
                    {% for u in top_users %}
                        <li>{{ u.user__username }}</li>
                    {% endfor %}
                </ul>
                <p class="mb-2"><strong>Top Comment Count:</strong> {{max_total}}</p>
            {% else %}
                <p class="text-muted mb-0">No comments yet.</p>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
