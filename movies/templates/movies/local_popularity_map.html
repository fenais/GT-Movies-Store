{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
  <h2>Local Popularity Map</h2>
  <p class="text-muted">
    Click a state marker to see the top trending movies (most purchased) in that region.
  </p>

  <div class="row">
    <div class="col-lg-8">
      <div id="map" style="height: 500px; border-radius: 8px;"></div>
    </div>

    <div class="col-lg-4">
      <div class="card">
        <div class="card-body">
          <h5 id="regionTitle">Select a region</h5>
          <ul id="topList" class="list-group list-group-flush"></ul>
        </div>
      </div>
    </div>
  </div>
</div>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  const map = L.map('map').setView([39.5, -98.35], 4);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  const stateCoords = {
    "AL": [32.806671, -86.791130],
    "AK": [61.370716, -152.404419],
    "AZ": [33.729759, -111.431221],
    "AR": [34.969704, -92.373123],
    "CA": [36.116203, -119.681564],
    "CO": [39.059811, -105.311104],
    "CT": [41.597782, -72.755371],
    "DE": [39.318523, -75.507141],
    "FL": [27.766279, -81.686783],
    "GA": [33.040619, -83.643074],
    "HI": [21.094318, -157.498337],
    "ID": [44.240459, -114.478828],
    "IL": [40.349457, -88.986137],
    "IN": [39.849426, -86.258278],
    "IA": [42.011539, -93.210526],
    "KS": [38.526600, -96.726486],
    "KY": [37.668140, -84.670067],
    "LA": [31.169546, -91.867805],
    "ME": [44.693947, -69.381927],
    "MD": [39.063946, -76.802101],
    "MA": [42.230171, -71.530106],
    "MI": [43.326618, -84.536095],
    "MN": [45.694454, -93.900192],
    "MS": [32.741646, -89.678696],
    "MO": [38.456085, -92.288368],
    "MT": [46.921925, -110.454353],
    "NE": [41.125370, -98.268082],
    "NV": [38.313515, -117.055374],
    "NH": [43.452492, -71.563896],
    "NJ": [40.298904, -74.521011],
    "NM": [34.840515, -106.248482],
    "NY": [42.165726, -74.948051],
    "NC": [35.630066, -79.806419],
    "ND": [47.528912, -99.784012],
    "OH": [40.388783, -82.764915],
    "OK": [35.565342, -96.928917],
    "OR": [44.572021, -122.070938],
    "PA": [40.590752, -77.209755],
    "RI": [41.680893, -71.511780],
    "SC": [33.856892, -80.945007],
    "SD": [44.299782, -99.438828],
    "TN": [35.747845, -86.692345],
    "TX": [31.054487, -97.563461],
    "UT": [40.150032, -111.862434],
    "VT": [44.045876, -72.710686],
    "VA": [37.769337, -78.169968],
    "WA": [47.400902, -121.490494],
    "WV": [38.491226, -80.954453],
    "WI": [44.268543, -89.616508],
    "WY": [42.755966, -107.302490],
    "DC": [38.897438, -77.026817]
  };

  const regionTitle = document.getElementById("regionTitle");
  const topList = document.getElementById("topList");

  async function loadTrending(stateCode) {
    const resp = await fetch("{% url 'movies.local_popularity_data' %}?state=" + stateCode);
    const data = await resp.json();

    regionTitle.textContent = "Trending in " + data.state;
    topList.innerHTML = "";

    if (!data.top || data.top.length === 0) {
      topList.innerHTML = '<li class="list-group-item text-muted">No purchases in this region yet.</li>';
      return;
    }

    for (const row of data.top) {
      const li = document.createElement("li");
      li.className = "list-group-item d-flex justify-content-between align-items-center";
      li.innerHTML = `
        <span>${row.movie__name}</span>
        <span class="badge bg-dark rounded-pill">${row.total_purchased}</span>
      `;
      topList.appendChild(li);
    }
  }

  for (const [state, coords] of Object.entries(stateCoords)) {
    const marker = L.marker(coords).addTo(map).bindPopup(state);
    marker.on("click", () => loadTrending(state));
  }
</script>
{% endblock %}
